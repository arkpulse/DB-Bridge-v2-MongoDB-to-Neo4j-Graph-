version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: mongo_db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: studentdb
    volumes:
      - mongo_data:/data/db

  neo4j:
    image: neo4j:5
    container_name: neo4j_db
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password123
    volumes:
      - neo4j_data:/data

  backend:
    build: ./backend
    container_name: node_backend
    ports:
      - "3001:3001"
    depends_on:
      - mongodb
      - neo4j
    environment:
      MONGO_URI: mongodb://mongodb:27017/studentdb
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASS: password123
      MIGRATE_INTERVAL_MS: 5000
    restart: on-failure

volumes:
  mongo_data:
  neo4j_data:
